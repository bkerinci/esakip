version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sakip2-app
    container_name: sakip2-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_NAME=E-SAKIP Juara
      - APP_ENV=production
      - APP_KEY=base64:MfrkCEYdrK1klidl+Qo31WM2baji7nraR5L4hU4JT4M=
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sakip2
      - DB_USERNAME=root
      - DB_PASSWORD=sakip2_secret
      - CACHE_DRIVER=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=sync
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: sakip2-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=sakip2
      - MYSQL_ROOT_PASSWORD=sakip2_secret
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
